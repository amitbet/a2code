name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.2.3 or v1.2.3)"
        required: false
        type: string
      build_macos_arm64:
        description: "Build macOS arm64"
        required: false
        default: true
        type: boolean
      build_macos_x64:
        description: "Build macOS x64"
        required: false
        default: false
        type: boolean
      build_linux_x64:
        description: "Build Linux x64"
        required: false
        default: false
        type: boolean
      build_windows_x64:
        description: "Build Windows x64"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: none

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  preflight:
    name: Resolve release metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_name: ${{ steps.release_meta.outputs.name }}
      ref: ${{ github.sha }}
      previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: release_meta
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${DISPATCH_VERSION:-}" ]]; then
            raw="${DISPATCH_VERSION}"
          else
            latest_tag="$(
              git tag --list 'v*.*.*' \
                | grep -Ev -- '-nightly\.' \
                | sort -V \
                | tail -n 1
            )"

            if [[ -z "$latest_tag" ]]; then
              version="0.0.1"
            else
              current="${latest_tag#v}"
              if [[ ! "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                echo "Latest stable tag has unexpected format: $latest_tag" >&2
                exit 1
              fi

              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              version="${major}.${minor}.$((patch + 1))"
            fi

            raw="v$version"
          fi

          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "name=A2 Code v$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - id: previous_tag
        name: Resolve previous release tag
        shell: bash
        run: |
          previous_tag="$(
            git tag --list 'v*.*.*' \
              | grep -Ev -- '-nightly\.' \
              | grep -Fxv "${{ steps.release_meta.outputs.tag }}" \
              | sort -V \
              | tail -n 1
          )"
          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

  build_macos_arm64:
    if: ${{ github.event_name == 'push' || inputs.build_macos_arm64 }}
    name: Build macOS arm64
    needs: preflight
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build unsigned desktop artifact
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform mac \
            --target dmg \
            --arch arm64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.dmg" "release/*.zip" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-mac-arm64
          path: release-publish/*
          if-no-files-found: error

  build_macos_x64:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_macos_x64 }}
    name: Build macOS x64
    needs: preflight
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build unsigned desktop artifact
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform mac \
            --target dmg \
            --arch x64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.dmg" "release/*.zip" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          for manifest in release-publish/*-mac.yml; do
            mv "$manifest" "${manifest%.yml}-x64.yml"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-mac-x64
          path: release-publish/*
          if-no-files-found: error

  build_linux_x64:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_linux_x64 }}
    name: Build Linux x64
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Install ImageMagick
        shell: bash
        run: |
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          fi

      - name: Build unsigned desktop artifact
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform linux \
            --target AppImage \
            --arch x64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.AppImage" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-x64
          path: release-publish/*
          if-no-files-found: error

  build_windows_x64:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_windows_x64 }}
    name: Build Windows x64
    needs: preflight
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Install Spectre-mitigated MSVC libs
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -products * -latest -property installationPath
          $setupExe = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $proc = Start-Process -FilePath $setupExe `
            -ArgumentList "modify", "--installPath", "`"$installPath`"", "--add", `
            "Microsoft.VisualStudio.Component.VC.Tools.x86.x64.Spectre", "--quiet", "--norestart" `
            -Wait -PassThru -NoNewWindow
          if ($null -eq $proc -or $proc.ExitCode -ne 0) {
            $code = if ($null -ne $proc) { $proc.ExitCode } else { 1 }
            Write-Error "Visual Studio Installer failed with exit code $code"
            exit $code
          }

      - name: Build unsigned desktop artifact
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform win \
            --target nsis \
            --arch x64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.exe" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-win-x64
          path: release-publish/*
          if-no-files-found: error

  release:
    if: |
      !failure() && !cancelled() &&
      needs.preflight.result == 'success' &&
      needs.build_macos_arm64.result == 'success'
    name: Publish GitHub Release
    needs:
      - preflight
      - build_macos_arm64
      - build_macos_x64
      - build_linux_x64
      - build_windows_x64
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: |
            args:
              - --filter=@t3tools/scripts...

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          name: desktop-mac-arm64
          path: release-assets

      - name: Publish release
        if: needs.preflight.outputs.previous_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          previous_tag: ${{ needs.preflight.outputs.previous_tag }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: false

  append_macos_x64:
    if: |
      !failure() && !cancelled() &&
      needs.preflight.result == 'success' &&
      needs.release.result == 'success' &&
      needs.build_macos_x64.result == 'success'
    name: Append macOS x64 assets
    needs:
      - preflight
      - release
      - build_macos_x64
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: desktop-mac-x64
          path: release-assets

      - name: Upload macOS x64 assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: false

  append_linux_x64:
    if: |
      !failure() && !cancelled() &&
      needs.preflight.result == 'success' &&
      needs.release.result == 'success' &&
      needs.build_linux_x64.result == 'success'
    name: Append Linux x64 assets
    needs:
      - preflight
      - release
      - build_linux_x64
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-x64
          path: release-assets

      - name: Upload Linux x64 assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          files: |
            release-assets/*.AppImage
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: false

  append_windows_x64:
    if: |
      !failure() && !cancelled() &&
      needs.preflight.result == 'success' &&
      needs.release.result == 'success' &&
      needs.build_windows_x64.result == 'success'
    name: Append Windows x64 assets
    needs:
      - preflight
      - release
      - build_windows_x64
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: desktop-win-x64
          path: release-assets

      - name: Upload Windows x64 assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          files: |
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: false

      - name: Publish first release
        if: needs.preflight.outputs.previous_tag == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: false
