name: Build Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_macos_arm64:
    name: Build macOS arm64
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - id: build_meta
        name: Resolve build version
        shell: bash
        run: |
          echo "version=0.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build unsigned desktop artifact
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform mac \
            --target dmg \
            --arch arm64 \
            --build-version "${{ steps.build_meta.outputs.version }}" \
            --verbose

      - name: Collect build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.dmg" "release/*.zip" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-mac-arm64
          path: release-publish/*
          if-no-files-found: error
          retention-days: 7

  build_macos_x64:
    name: Build macOS x64
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - id: build_meta
        name: Resolve build version
        shell: bash
        run: |
          echo "version=0.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build unsigned desktop artifact
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform mac \
            --target dmg \
            --arch x64 \
            --build-version "${{ steps.build_meta.outputs.version }}" \
            --verbose

      - name: Collect build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.dmg" "release/*.zip" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          for manifest in release-publish/*-mac.yml; do
            mv "$manifest" "${manifest%.yml}-x64.yml"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-mac-x64
          path: release-publish/*
          if-no-files-found: error
          retention-days: 7

  build_linux_x64:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - id: build_meta
        name: Resolve build version
        shell: bash
        run: |
          echo "version=0.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Install ImageMagick
        shell: bash
        run: |
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          fi

      - name: Build unsigned desktop artifact
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform linux \
            --target AppImage \
            --arch x64 \
            --build-version "${{ steps.build_meta.outputs.version }}" \
            --verbose

      - name: Collect build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.AppImage" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-x64
          path: release-publish/*
          if-no-files-found: error
          retention-days: 7

  build_windows_x64:
    name: Build Windows x64
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - id: build_meta
        name: Resolve build version
        shell: bash
        run: |
          echo "version=0.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Install Spectre-mitigated MSVC libs
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -products * -latest -property installationPath
          $setupExe = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $proc = Start-Process -FilePath $setupExe `
            -ArgumentList "modify", "--installPath", "`"$installPath`"", "--add", `
            "Microsoft.VisualStudio.Component.VC.Tools.x86.x64.Spectre", "--quiet", "--norestart" `
            -Wait -PassThru -NoNewWindow
          if ($null -eq $proc -or $proc.ExitCode -ne 0) {
            $code = if ($null -ne $proc) { $proc.ExitCode } else { 1 }
            Write-Error "Visual Studio Installer failed with exit code $code"
            exit $code
          }

      - name: Build unsigned desktop artifact
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform win \
            --target nsis \
            --arch x64 \
            --build-version "${{ steps.build_meta.outputs.version }}" \
            --verbose

      - name: Collect build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.exe" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-win-x64
          path: release-publish/*
          if-no-files-found: error
          retention-days: 7
